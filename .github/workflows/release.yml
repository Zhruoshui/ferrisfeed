name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. v1.0.0). Used for the tag, release name and image tag."
        required: true
        type: string

# Allow creating releases and pushing packages to GHCR.
permissions:
  contents: write
  packages: write

env:
  FLUTTER_VERSION: "3.44.1"
  # flutter_rust_bridge depends on a git ref; fetch git deps via the CLI so
  # cargo can resolve them reliably in CI.
  CARGO_NET_GIT_FETCH_WITH_CLI: "true"

jobs:
  # Resolve the version once so every build job agrees on the tag/name.
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.resolve.outputs.version }}      # e.g. v1.0.0
      version_number: ${{ steps.resolve.outputs.number }} # e.g. 1.0.0
    steps:
      - id: resolve
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            version="${{ github.event.inputs.version }}"
          else
            version="${GITHUB_REF_NAME}"
          fi
          if [[ ! "$version" =~ ^v[0-9]+\.[0-9]+\.[0-9]+ ]]; then
            echo "Version '$version' must look like v1.2.3" >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "number=${version#v}" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $version"

  android:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add Android Rust targets
        run: rustup target add aarch64-linux-android armv7-linux-androideabi x86_64-linux-android i686-linux-android

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Cache cargo registry & git
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: cargo-android-${{ hashFiles('rust/Cargo.lock') }}
          restore-keys: cargo-android-

      - name: Decode Android keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [[ -z "$ANDROID_KEYSTORE_BASE64" ]]; then
            echo "::error::ANDROID_KEYSTORE_BASE64 secret is not set. Add the signing secrets to enable release signing." >&2
            exit 1
          fi
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > "${RUNNER_TEMP}/release.keystore"
          echo "ANDROID_KEYSTORE_PATH=${RUNNER_TEMP}/release.keystore" >> "$GITHUB_ENV"

      - name: Build signed APK & AAB
        env:
          # build.gradle.kts reads these env vars when key.properties is absent.
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          flutter pub get
          flutter build apk --release \
            --build-name "${{ needs.prepare.outputs.version_number }}"
          flutter build appbundle --release \
            --build-name "${{ needs.prepare.outputs.version_number }}"

      - name: Stage Android artifacts
        run: |
          mkdir -p staging
          cp build/app/outputs/flutter-apk/app-release.apk \
            "staging/ferrisfeed-${{ needs.prepare.outputs.version }}.apk"
          cp build/app/outputs/bundle/release/app-release.aab \
            "staging/ferrisfeed-${{ needs.prepare.outputs.version }}.aab"

      - uses: actions/upload-artifact@v4
        with:
          name: android
          path: staging/*
          if-no-files-found: error

  linux:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libstdc++-12-dev \
            libfuse2 libssl-dev

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Cache cargo registry & git
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: cargo-linux-${{ hashFiles('rust/Cargo.lock') }}
          restore-keys: cargo-linux-

      - name: Fetch appimagetool
        run: |
          curl -fsSL -o "${RUNNER_TEMP}/appimagetool" \
            https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x "${RUNNER_TEMP}/appimagetool"

      - name: Build Linux bundle (tar.gz) and AppImage
        env:
          APPIMAGETOOL: ${{ runner.temp }}/appimagetool
          LINUX_ARCHIVE_NAME: ferrisfeed-${{ needs.prepare.outputs.version }}-linux-x64.tar.gz
          APPIMAGE_NAME: FerrisFeed-${{ needs.prepare.outputs.version }}-x86_64.AppImage
          FLUTTER_BIN: flutter
        run: |
          flutter config --enable-linux-desktop
          # build-linux-appimage internally runs build-linux-bundle first, so a
          # single call produces both the tar.gz and the AppImage in dist/.
          ./tools/build-linux-appimage --build-name "${{ needs.prepare.outputs.version_number }}"

      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: dist/*
          if-no-files-found: error

  web-image:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute lowercase image name
        id: image
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.web
          push: true
          tags: ${{ steps.image.outputs.name }}:${{ needs.prepare.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    needs: [prepare, android, linux, web-image]
    runs-on: ubuntu-latest
    steps:
      - name: Download Android artifacts
        uses: actions/download-artifact@v4
        with:
          name: android
          path: artifacts

      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: linux
          path: artifacts

      - name: Compute lowercase image name
        id: image
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.version }}
          name: ${{ needs.prepare.outputs.version }}
          generate_release_notes: true
          files: artifacts/*
          body: |
            ## FerrisFeed ${{ needs.prepare.outputs.version }}

            ### 桌面 / 移动产物
            下方附件包含 Android (APK/AAB) 与 Linux (tar.gz / AppImage)。

            ### Web (Docker)
            ```bash
            docker pull ${{ steps.image.outputs.name }}:${{ needs.prepare.outputs.version }}
            docker run -p 8080:80 ${{ steps.image.outputs.name }}:${{ needs.prepare.outputs.version }}
            ```
